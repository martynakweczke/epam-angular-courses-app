<h2 class="text-align-center">Login</h2>
<div class="app-plate">
  <div class="login-form">
    <form
      #loginForm="ngForm"
      class="login-form"
      (ngSubmit)="loginForm.valid && onSubmit()"
    >
      <div class="form__control">
        <label for="email">Email</label>
        <input
          type="text"
          id="email"
          placeholder="Input text"
          name="email"
          ngModel
          required
          emailValidator
          #email="ngModel"
        />
        <div
          *ngIf="
            email.errors?.['required'] && (email.touched || loginForm.submitted)
          "
          id="emailErrorMessage"
          class="text-danger"
        >
          Email is required.
        </div>
        <div
          *ngIf="
            email.errors?.['emailInvalid'] &&
            (email.touched || loginForm.submitted)
          "
          id="emailInvalidErrorMessage"
          class="text-danger"
        >
          Email is invalid.
        </div>
      </div>
      <div class="form__control">
        <label for="password">Password</label>
        <div class="password__container">
          <input
            type="password"
            id="password"
            class="password__input"
            placeholder="Input text"
            name="password"
            ngModel
            required
            #password="ngModel"
            togglePassword
            #togglePassword="togglePassword"
          />
          <button
            type="button"
            class="password__toggle-button"
            (click)="togglePassword.toggle()"
          >
            <img
              src="{{
                togglePassword.isVisible
                  ? 'assets/eye-off-icon.svg'
                  : 'assets/eye-icon.svg'
              }}"
              alt="Toggle Password Visibility"
            />
          </button>
        </div>
        <div
          *ngIf="
            password.errors?.['required'] &&
            (password.touched || loginForm.submitted)
          "
          id="passwordErrorMessage"
          class="text-danger"
        >
          Password is required.
        </div>
      </div>
      <div>
        <div class="form__action">
          <app-button [buttonText]="'Login'"></app-button>
        </div>
        <div class="form__text">
          If you don't have an account you may <a href="/registration"><strong>Registration</strong></a>
        </div>
      </div>
    </form>
  </div>
</div>
